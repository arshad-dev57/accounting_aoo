name: LedgerPro_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  intl: ^0.20.2
  sizer: ^3.1.3
  pdf: ^3.12.0
  printing: ^5.14.3
  fl_chart: ^1.2.0
  shared_preferences: ^2.5.5
  syncfusion_flutter_charts: ^33.1.45
  animated_text_kit: ^4.2.2
  loading_animation_widget: ^1.3.0
  share_plus: ^12.0.2
  path_provider: ^2.1.3
  open_file: ^3.3.2
  excel: ^4.0.6
  iconify_flutter: ^0.0.7
  shimmer: ^3.0.0
  pinput: ^6.0.2
  image_picker: ^1.2.1
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/